# ══════════════════════════════════════════════════
#  APPLICATION PROPERTIES
#  Spring Boot reads this file on startup to configure
#  the application. Keys follow the format: category.subcategory.property
# ══════════════════════════════════════════════════

# ─────────────────────────────────
#  SERVER
# ─────────────────────────────────
# The port your backend runs on locally.
# Your React frontend will call http://localhost:8080/api/...
server.port=8080

# ─────────────────────────────────
#  H2 IN-MEMORY DATABASE
# ─────────────────────────────────
# JDBC URL for H2. "mem:logindb" means "in-memory database named logindb".
# DB_CLOSE_DELAY=-1 keeps the DB alive as long as the JVM runs.
# DB_CLOSE_ON_EXIT=FALSE prevents auto-close when the connection pool empties.
spring.datasource.url=jdbc:h2:mem:logindb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ─────────────────────────────────
#  H2 CONSOLE (Dev Tool)
# ─────────────────────────────────
# Enables the H2 browser-based console at: http://localhost:8080/h2-console
# Use these credentials to connect:
#   JDBC URL:  jdbc:h2:mem:logindb
#   Username:  sa
#   Password:  (leave blank)
# This lets you run SQL queries directly on your in-memory DB while developing.
# DISABLE this in production (spring.h2.console.enabled=false).
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─────────────────────────────────
#  JPA / HIBERNATE
# ─────────────────────────────────
# DDL Auto: how Hibernate manages the schema (table creation/updates)
#   create-drop → creates tables on startup, DROPS everything on shutdown (good for H2)
#   update      → updates schema without dropping data (good for dev with real DB)
#   validate    → only checks schema, never modifies (good for production)
#   none        → do nothing (use for production with manual migrations)
spring.jpa.hibernate.ddl-auto=create-drop

# Show the SQL queries Hibernate runs in the console.
# Helpful for learning what JPA does under the hood — disable when it gets noisy.
spring.jpa.show-sql=true

# Formats the SQL so it's readable (indented) instead of one long line.
spring.jpa.properties.hibernate.format_sql=true

# Specifies the SQL dialect for H2 (tells Hibernate what SQL flavour to use).
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ─────────────────────────────────
#  LOGGING
# ─────────────────────────────────
# INFO shows startup messages and key events.
# Change to DEBUG for more verbose output during troubleshooting.
logging.level.root=INFO
logging.level.com.loginapp=DEBUG
